name: Release

# Builds a signed release APK and publishes it (plus an update.json manifest) as a GitHub
# Release. Point the launcher's update URL at:
#   https://github.com/<owner>/<repo>/releases/latest/download/update.json
# and it will self-update to each new release.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      versionName:
        description: "Version name (e.g. 0.2.0)"
        required: true
        default: "0.1.0"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            NAME="${GITHUB_REF_NAME#v}"
          else
            NAME="${{ github.event.inputs.versionName }}"
          fi
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "code=${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - name: Decode signing keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.jks"
            echo "KEYSTORE_FILE=$RUNNER_TEMP/release.jks" >> "$GITHUB_ENV"
          else
            echo "::warning::No KEYSTORE_BASE64 secret set — building with the debug key. " \
                 "Self-update needs a stable key; add the KEYSTORE_* secrets for that to work."
          fi

      - name: Build release APK
        env:
          VERSION_CODE: ${{ steps.version.outputs.code }}
          VERSION_NAME: ${{ steps.version.outputs.name }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Stage artifacts
        env:
          VERSION_CODE: ${{ steps.version.outputs.code }}
          VERSION_NAME: ${{ steps.version.outputs.name }}
        run: |
          cp app/build/outputs/apk/release/app-release.apk launcher.apk
          cat > update.json <<EOF
          {
            "versionCode": ${VERSION_CODE},
            "versionName": "${VERSION_NAME}",
            "apkUrl": "https://github.com/${{ github.repository }}/releases/latest/download/launcher.apk",
            "notes": "Release v${VERSION_NAME}"
          }
          EOF

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.name }}
          name: v${{ steps.version.outputs.name }}
          files: |
            launcher.apk
            update.json
          fail_on_unmatched_files: true
